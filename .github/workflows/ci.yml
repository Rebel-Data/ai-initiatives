name: CI/CD

# Mirrors the Rebel-Data/rgmp-applications workflow:
# lint + typecheck + build on every push/PR, deploy to Cloud Run on push to main.
# Deploy just rolls the image forward — env vars, INTERNAL_API_KEY secret
# binding, and Cloud SQL attachment are owned by the one-time service
# bootstrap (README → "Deployment (first-time bootstrap)"). gcloud preserves
# unspecified flags on update, so we don't re-assert them here.

on:
  push:
    paths-ignore:
      - "*.md"
      - "docs/**"
    branches: [main]
  pull_request:
    paths-ignore:
      - "*.md"
      - "docs/**"
    branches: [main]

env:
  NODE_VERSION: '22'
  PROJECT_ID: mobility-payments-db
  REGION: europe-west4
  SERVICE_NAME: ai-initiatives
  IMAGE_NAME: europe-west4-docker.pkg.dev/mobility-payments-db/cloud-run/ai-initiatives

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    # Runs in parallel with lint-and-typecheck — both need npm ci, but they're
    # independent. Gating Build on Lint added ~28s of wall-clock to every PR
    # for no extra signal (next build runs its own typecheck anyway).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build
        env:
          # Prisma/next build don't hit the DB, but DATABASE_URL must be a
          # syntactically valid URL for Prisma Client init checks.
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: npm run build

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west4-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        # Replaces the previous pull/build/push triplet. GHA cache (type=gha,
        # mode=max) caches every layer of every stage of the multi-stage
        # Dockerfile — including the heavy deps + builder stages where
        # registry-inline cache only covered the final stage. Cache lives in
        # GitHub's per-repo Actions cache, free up to 10GB.
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_COMMIT_HASH=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        env:
          SHA: ${{ github.sha }}
          IMAGE: ${{ env.IMAGE_NAME }}
          SERVICE: ${{ env.SERVICE_NAME }}
          REGION: ${{ env.REGION }}
          PROJECT: ${{ env.PROJECT_ID }}
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE:$SHA" \
            --region "$REGION" \
            --platform managed \
            --project "$PROJECT"

      - name: Show deployment URL
        env:
          SERVICE: ${{ env.SERVICE_NAME }}
          REGION: ${{ env.REGION }}
          PROJECT: ${{ env.PROJECT_ID }}
        run: |
          gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --project "$PROJECT" \
            --format 'value(status.url)'
